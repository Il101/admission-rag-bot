# German Language Courses - Austria and Online
# SSOT: Course providers, prices, learning time estimates
# Last verified: 2026-03-01

id: courses-austria

# Learning time estimates (UE = Unterrichtseinheit, 45 min)
learning_time_estimates:
  a1:
    hours_from_zero: "80-120 UE"
    intensive_3_4h_day: "4-6 weeks"
    partial_1_2h_day: "3-4 months"
  a2:
    hours_from_a1: "80-120 UE"
    intensive_3_4h_day: "4-6 weeks"
    partial_1_2h_day: "3-4 months"
  b1:
    hours_from_a2: "150-200 UE"
    intensive_3_4h_day: "6-8 weeks"
    partial_1_2h_day: "5-6 months"
  b2:
    hours_from_b1: "200-250 UE"
    intensive_3_4h_day: "8-10 weeks"
    partial_1_2h_day: "6-9 months"
  c1:
    hours_from_b2: "300-400 UE"
    intensive_3_4h_day: "10-14 weeks"
    partial_1_2h_day: "9-12 months"

  total_zero_to_b2: "600-700 UE"
  notes:
    - "Individual variation is significant"
    - "Russian speakers find German slightly easier - similar grammar structure"
    - "Minimum for most universities: B2"

# VHS (Volkshochschule) - Government-subsidized courses
vhs:
  description: "State adult education centers - subsidized courses throughout Austria"

  wien:
    website: vhs.at
    consultation_test:
      name: "Einstufungstest"
      cost: 0
      notes: "Free placement test and consultation"
    standard_course:
      levels: "A1-B2"
      cost: 470
      hours: "81 UE"
      duration: "8-10 weeks"
    intensive_b2:
      level: "B2"
      cost: 470
      sessions: 27
      duration: "10 weeks"
    fokus_short:
      level: "B2"
      cost: 116
      content: "Communication/Grammar"
      duration: "4-5 weeks"
    c1_fokus:
      level: "C1"
      cost: 134
      format: "Online"
      duration: "4-5 weeks"
    osd_c1_exam_prep:
      level: "C1"
      cost: 201
      notes: "Exam format prep only, not language teaching"
    locations: "12 branches across districts + online option"

  graz:
    website: vhs-graz.at
    cost_per_level: "€350-420"

  innsbruck:
    website: vhs-innsbruck.at
    cost_per_level: "€320-400"

  linz:
    website: vhs-linz.at
    cost_per_level: "€300-380"

  salzburg:
    website: vhs-salzburg.at
    cost_per_level: "€320-400"

  search_all_austria:
    - vhs.at
    - volkshochschule.at

# Private language schools (Austria)
private_schools:
  sprachschule_aktiv_wien:
    website: sprachschule-aktiv-wien.at
    description: "Popular with foreign students, ÖIF-certified center"
    courses:
      intensivkurs_fulltime:
        schedule: "Mon-Fri"
        duration: "4 weeks"
        cost: 499
        regular_cost: 599
      intensivkurs_8weeks:
        duration: "8 weeks"
        cost: 998
      intensivkurs_light:
        duration: "4 weeks"
        cost: 379
      semi_intensiv:
        schedule: "Mon-Thu"
        duration: "4 weeks"
        cost: 299
      online_evening:
        duration: "4 weeks (B2: 8 weeks)"
        cost: 499
      oif_exam_prep:
        duration: "4 weeks (B2: 8 weeks)"
        cost: "€499/€998"

  cib_sprachschule:
    website: cib.or.at
    description: "Specializes in ÖIF integration exams, accepts ÖIF-Gutscheine"
    courses:
      a2_intensiv_vm:
        hours: "200 UE"
        cost: 980
        exam_extra: 200
      a2_intensiv_evening:
        hours: "200 UE"
        cost: 980
        accepts_voucher: true

  goethe_institut_wien:
    website: goethe.de/ins/de/de/ort/wie.html
    description: "Most prestigious, certificates recognized worldwide"
    courses:
      a1_a2:
        cost_range: "€300-600/course"
        format: "In-person / Online"
      b1_b2:
        cost_range: "€500-900/course"
        format: "In-person / Online"
      c1:
        cost_range: "€700-1,200/course"
        format: "In-person / Online"
    notes: "Significantly more expensive than VHS, but certificate valued higher"

# University language centers (cheapest for enrolled students)
uni_sprachzentren:
  description: "Cheapest option for already enrolled students"
  cost_range: "€50-200/semester"
  access: "Only for enrolled students of that university"
  warning: "Registration opens with course registration - fills up fast!"

  institutions:
