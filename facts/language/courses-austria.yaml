# Recommended strategy from Russia to B2
strategy_russia_to_b2:
  stage_1:
    months: "1-2"
    content: "DW Deutsch A1 + DeutschAkademie grammar"
  stage_2:
    months: "2-4"
    content: "Babbel A2 + Nicos Weg episodes"
  stage_3:
    months: "4-7"
    content: "iTalki (2-3 lessons/week) + DW B1/B2"
  stage_4:
    months: "7-10"
    content: "Goethe Institut Online B2 + exam preparation"

