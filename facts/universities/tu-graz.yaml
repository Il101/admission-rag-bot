  en: Graz University of Technology
  ru: Технический университет Граца

city: Graz
website: https://www.tugraz.at
admission_portal: https://online.tugraz.at
students_count: 13000
founded: 1811

# КРИТИЧНО: Документы только по ПОЧТЕ!
submission:
  method: mail_only
  address: |
    Technische Universität Graz
    Studienabteilung (Registrar's Office)
    Rechbauerstraße 12
    A-8010 Graz
    AUSTRIA
  notes:
    - "Принципиальное отличие от Uni Graz — документы по ПОЧТЕ, не онлайн!"
    - "Заявки по email НЕ рассматриваются"
    - "Заявки через агентства ОТКЛОНЯЮТСЯ (§60 Universitätsgesetz)"
    - "TU Graz СОХРАНЯЕТ документы (возврат только по запросу)"
    - "Pre-registration в TUGRAZonline ПЕРЕД отправкой почтой"
  pre_registration:
    portal: https://online.tugraz.at
    opened: 2025-12-19
  source_url: https://www.tugraz.at/en/studying-and-teaching/studying-at-tu-graz/prospective-students/registration-and-admission/admission-of-international-degree-programme-applicants/
  last_verified: 2026-03-01

