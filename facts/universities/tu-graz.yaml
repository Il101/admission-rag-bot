    - name: Architecture
      type: creative_test_portfolio
      registration_period: "~март–апрель"

    - name: Molecular Biology (NAWI Graz)
      type: test
      registration_period: "~март–апрель"

  master:
    - name: Computer Science
      language: english
      status: "ЗАКРЫТО Winter 2026/27 (регистрация была октябрь-декабрь 2025)"

    - name: Software Engineering and Management
      language: english
      status: "ЗАКРЫТО Winter 2026/27"

    - name: Information and Computer Engineering
      language: english
      status: "ЗАКРЫТО Winter 2026/27"

    - name: Machine Learning
      language: english
      status: "Уточнять"

    - name: Biomedical Engineering
      language: english
      status: "Уточнять"

    - name: Advanced Materials Science (NAWI)
      language: english
      registration:
        start: 2025-10-15
        end: 2025-12-15
      status: "Закрыто"

  notes: "Для большинства English Master регистрация на Winter 2026/27 УЖЕ ЗАКРЫТА! Следующий приём Summer 2027 или Winter 2027/28."
  source_url: https://www.tugraz.at/en/studying-and-teaching/degree-and-certificate-programmes/masters-degree-programmes/
  last_verified: 2026-03-01

# Bachelor программы со специальными требованиями к английскому
programs_require_english_c1:
  list:
    - Informatik (Computer Science)
    - Software Engineering and Management
    - Information and Computer Engineering
    - Chemical and Process Engineering
  notes: "Эти 4 программы требуют НЕМЕЦКИЙ C1 + АНГЛИЙСКИЙ C1!"

# Master программы на английском
programs_master_english:
  computer_science:
    - Computer Science (MSc)
    - Software Engineering and Management (MSc)
    - Information and Computer Engineering (MSc)
    - Machine Learning (MSc)
    - Biomedical Engineering (MSc)

  engineering:
    - Mechanical Engineering (MSc)
    - Electrical Engineering (MSc)
    - Sustainable Energy Systems (MSc)
    - Space Sciences and Earth from Space (MSc)

  nawi_graz:
    - Advanced Materials Science
    - Environmental Geosciences
    - Chemistry
    - Physics

# NAWI Graz партнёрство
nawi_graz:
  description: "Совместная программа TU Graz + Uni Graz (с 2008)"
  website: https://www.nawigraz.at

  bachelor_programs:
    - name: Chemie
      main_university: TU Graz
    - name: Physik
      main_university: Uni Graz
    - name: Mathematik
      main_university: Uni Graz
    - name: Erdwissenschaften
      main_university: Uni Graz
    - name: Molecular Biology
      main_university: Uni Graz
    - name: Environmental Systems Science
      main_university: Uni Graz

  master_english:
    - name: Advanced Materials Science
      main_university: TU Graz
    - name: Environmental Geosciences
      main_university: Uni Graz
    - name: Computational Science
      main_university: TU Graz
    - name: Chemistry – Advanced Synthesis and Catalysis
      main_university: TU Graz

  admission: "Специальная процедура, регистрация 15 октября — 15 декабря ежегодно"
  source_url: https://www.nawigraz.at/en/teaching/
  last_verified: 2026-03-01

# Документы для подачи
required_documents:
  list:
    - name: Форма заявления (Application for Admission)
      notes: "Скачать с tugraz.at, заполнить, распечатать, подписать"
      required: true

    - name: Паспорт
      notes: "Простая цветная копия всех страниц (нотариальное заверение НЕ требуется)"
      required: true

    - name: Аттестат о среднем образовании
      required: true
      legalization: apostille
      translation: sworn_translator
      languages: [de, en]

    - name: Транскрипт/Zeugnis
      required: true
      translation: required

    - name: Языковой сертификат немецкого
      required: true
      validity: 2 years

    - name: Языковой сертификат английского C1
      required: conditional
      condition: "Для CS/SEM/ICE/CPE Bachelor и всех English Masters"

  source_url: https://www.tugraz.at/en/studying-and-teaching/studying-at-tu-graz/prospective-students/registration-and-admission/admission-of-international-degree-programme-applicants/
  last_verified: 2026-03-01

