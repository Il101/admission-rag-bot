# Требования к языкам — особые!
language_requirements:
  german:
    direct_admission: C1
    submission_minimum: A2
    notes: "C1 для зачисления. Если нет C1 → направляют в VGUH Graz."
    certificates:
      c1:
        - name: ÖSD C1
        - name: Goethe-Zertifikat C1
        - name: TestDaF TDN4
          notes: "TDN4 в каждом разделе"
        - name: DSH-2
        - name: DSH-3
        - name: telc Deutsch C1 / telc Deutsch C1 Hochschule
        - name: EPD от VGUH Graz
        - name: Matura немецкоязычной школы
    certificate_validity_years: 2
    source_url: https://www.tugraz.at/en/studying-and-teaching/studying-at-tu-graz/prospective-students/registration-and-admission/admission-of-international-degree-programme-applicants/proof-of-german-language-competence
    last_verified: 2026-03-01

  english:
    required_for:
      - CS Bachelor
      - Software Engineering and Management Bachelor
      - Information and Computer Engineering Bachelor
      - Chemical and Process Engineering Bachelor
      - All English Master programs
    min_level: C1
    certificates:
      - name: IELTS Academic
        min_score: 7.0
      - name: TOEFL iBT
        min_score: 95
      - name: Cambridge C1 Advanced (CAE)
        min_score: 180
      - name: Cambridge C2 Proficiency (CPE)
        min_score: "Grade C"
      - name: PTE Academic
        min_score: 76
    notes: "4 Bachelor программы требуют НЕМЕЦКИЙ C1 + АНГЛИЙСКИЙ C1!"
    supplementary_exam: "VDE в VGUH Graz (если нет C1 по английскому)"
    source_url: https://www.tugraz.at/en/studying-and-teaching/studying-at-tu-graz/prospective-students/registration-and-admission/admission-of-international-degree-programme-applicants/proof-of-english-language-competence
    last_verified: 2026-03-01

# Стоимость
tuition:
  - category: non-eu
    amount: 726.72
    currency: EUR
    period: semester
    additional:
      - name: ÖH-Beitrag
        amount: 25.20
    total: 751.92
    source_url: https://www.tugraz.at/en/studying-and-teaching/studying-at-tu-graz/prospective-students/financial-matters/tuition-fees-and-the-austrian-student-union-fee
    last_verified: 2026-03-01

  - category: eu
    amount: 0
    currency: EUR
    period: semester
    additional:
      - name: ÖH-Beitrag
        amount: 25.20
    total: 25.20
    last_verified: 2026-03-01

  - category: rwr_card
    amount: 0
    currency: EUR
    period: semester
    notes: "RWR Card и Family Permit = только ÖH-Beitrag"
    additional:
      - name: ÖH-Beitrag
        amount: 25.20
    total: 25.20
    last_verified: 2026-03-01

# Вступительные экзамены
entrance_exams:
