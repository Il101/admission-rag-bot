# Требования к немецкому языку
language_requirements:
  german:
    direct_admission: C1
    vwu_admission: A2
    notes: "Uni Wien требует C1 (как TU Wien, но в отличие от Uni Graz/Innsbruck где B2)"
    certificates:
      c1:
        - name: ÖSD Zertifikat C1
        - name: Goethe-Zertifikat C1
        - name: TestDaF TDN4
          notes: "TDN4 в КАЖДОМ разделе (если хоть один TDN3 — не C1!)"
        - name: DSH-2
        - name: DSH-3
        - name: telc Deutsch C1 Hochschule
        - name: ÖIF-Test C1
        - name: Matura из немецкоязычной школы 4+ лет
    certificate_validity_years: 2
    source_url: https://studieren.univie.ac.at/en/admission/german-language-proficiency/
    last_verified: 2026-03-01

  english:
    required_for: master-english-programs
    min_level: B2
    notes: "C1 для программ кафедры английского языка. C2 для Translation!"
    certificates:
      - name: TOEFL iBT
      - name: IELTS Academic
      - name: Cambridge CAE
      - name: Cambridge CPE
    source_url: https://studieren.univie.ac.at/en/admission/
    last_verified: 2026-03-01

