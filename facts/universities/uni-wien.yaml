      - Applied Economics
      - Business Analytics
      - Banking and Finance
      - Global Demography
    humanities:
      - Anglophone Literatures and Cultures
      - Arabic Linguistics
      - Global History and Global Studies
      - Cognition Behavior and Neurobiology (CoBeNe)
    sciences:
      - Astronomy
      - Botany
      - Biological Chemistry
      - Bioinformatics
    other:
      - Spatial Data Science and GeoCommunication
      - Governing Socio-Ecological Transformations

# VWU специфика для Uni Wien
vwu:
  name: VWU Wien (Vorstudienlehrgang der Wiener Universitäten)
  applies: true
  address: "Sechshauser Straße 33A (секретариат) / 72 (курсы), 1150 Wien"
  website: https://vorstudienlehrgang.oead.at/de/wien

  costs:
    direct_track:
      amount_range: "530-630"
      currency: EUR
      period: semester
      eligibility: "Беженцы, граждане LDC стран. Граждане СНГ НЕ попадают!"
    kooperationspartner:
      amount_range: "1800-2000"
      currency: EUR
      period: semester
      providers: ["die Berater®", "Sprachenzentrum Uni Wien", "ZIB Training"]
      notes: "Для всех остальных"

  ergaenzungspruefungen:
    - subject: Deutsch
      cost: 132
      notes: "€66 письменный + €66 устный"
    - subject: Englisch
      cost: 132
      notes: "€66 письменный + €66 устный"
    - subject: Mathematik
      cost: 132
      notes: "€66 письменный + €66 устный"
    - subject: Physik
      cost: 46
    - subject: Chemie
      cost: 46
    - subject: Biologie
      cost: 46
    - subject: Geschichte
      cost: 46
    - subject: Geographie
      cost: 46

  trap: "ПРАВИЛО EPD: Если зачислен в VWU — единственное доказательство C1 это EPD от VWU. Нельзя сдать ÖSD/Goethe на стороне!"
  max_semesters: 4
  notes:
    - "Можно сдать Ergänzungsprüfungen БЕЗ прохождения курсов (если уже знаешь материал)"
    - "Нельзя делать предрегистрацию из-за границы"
  source_url: https://studieren.univie.ac.at/en/admission/non-degree-programme/university-preparation-programme-of-the-vienna-universities-vwu/
  last_verified: 2026-03-01

# Подача документов
submission:
  method: online_only
  portal: https://uspace.univie.ac.at
  identity_verification: ["online_video", "in_person"]
  notes:
    - "Единственный крупный австрийский вуз с полностью онлайн подачей"
    - "Online-Erstzulassung (видеозвонок) — можно зачислиться не приезжая в Вену!"
    - "Паспорт — JPEG/PNG (не PDF!)"
    - "Аттестат + апостиль + перевод — всё в одном PDF"

  documents:
    - name: Паспорт или ID
      format: JPEG или PNG
      required: true
    - name: Аттестат о среднем образовании
      format: PDF
      required: true
      legalization: apostille
      translation: sworn_translator
    - name: Транскрипт
      format: PDF
      required: true
    - name: Сертификат немецкого языка
      format: PDF
      required: true
    - name: Диплом/транскрипт вуза
      format: PDF
      required: conditional
      condition: "Если учился в вузе"

  source_url: https://studieren.univie.ac.at/en/admission/bachelordiploma-programmes/zulassung/non-eueea-with-little-german/
  last_verified: 2026-03-01

