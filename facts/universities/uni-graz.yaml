# Требования к немецкому языку
language_requirements:
  german:
    direct_admission: C1
    submission_minimum: A2
    notes: "С 2026 года Uni Graz тоже требует C1 (раньше было B2)"
    certificates:
      c1:
        - name: ÖSD Zertifikat C1
        - name: Goethe-Zertifikat C1
        - name: TestDaF TDN5
          notes: "TDN5 в каждом разделе (или сумма соответствующая C1)"
        - name: telc Deutsch C1
        - name: DSD II
        - name: EPD от VGUH Graz
        - name: Matura с немецким как языком обучения
    certificate_validity_years: 2
    source_url: https://internationale-studierende.uni-graz.at/en/language-certificates/
    last_verified: 2026-03-01

  english:
    required_for: master-english-programs
    min_level: B2-C1
    certificates:
      - name: Cambridge CAE (C1 Advanced)
        min_score: 180
      - name: Cambridge CPE (C2 Proficiency)
        min_score: "Grade C"
      - name: Pearson PTE Academic
        min_score: 76
      - name: TOEFL iBT
        min_score: 95
        notes: "для некоторых программ 100+"
      - name: IELTS Academic
        min_score: 7.0
    source_url: https://internationale-studierende.uni-graz.at/en/language-certificates/
    last_verified: 2026-03-01

