# Подача документов
submission:
  method: online_only
  portal: https://online.uni-graz.at
  enrollment: in_person
  notes:
    - "При подаче — сканы оригиналов"
    - "Оригиналы предъявляются при личном зачислении"
    - "После ввода данных — скачать 'Application for enrollment', подписать, отправить на studienabteilung@uni-graz.at"

  documents:
    - name: Паспорт или ID
      format: JPG или PDF
      required: true
    - name: Аттестат о среднем образовании
      format: PDF
      required: true
      legalization: apostille
      translation: sworn_translator
      languages: [de, en]
    - name: Транскрипт
      format: PDF
      required: true
    - name: Сертификат немецкого языка
      levels: [A2, C1]
      format: PDF
      required: true
    - name: APS-сертификат
      required: conditional
      condition: "Обязательно для студентов из Китая!"

  country_specific:
    russia:
      national_exam: not_required
      notes: "Россия НЕ указана в списке стран с обязательным национальным экзаменом"
    china:
      aps_certificate: required
    iran:
      national_exam: "Konkur или Pre-University Course"
    kazakhstan:
      national_exam: required

  source_url: https://internationale-studierende.uni-graz.at/en/application-bachelor-diploma-studies/
  last_verified: 2026-03-01

