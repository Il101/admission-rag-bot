# VGUH — подготовительная программа Граца
vguh:
  name: VGUH (Vorstudienlehrgang der Grazer Universitäten)
  applies: true
  address: "Neubaugasse 10, 8020 Graz"
  website: https://vguh.uni-graz.at
  oead_page: https://vorstudienlehrgang.oead.at/en/graz

  partners: ["Uni Graz", "TU Graz", "Med Uni Graz", "FH Joanneum"]

  costs:
    standard:
      amount: 529
      currency: EUR
      period: semester
      hours: "до 24 уроков/нед."
    intensive:
      amount: 829
      currency: EUR
      period: semester
      hours: "более 24 уроков/нед."
    notes: "Цена VGUH Graz ЗНАЧИТЕЛЬНО ниже VWU Wien (~€1800)!"

  structure:
    - modules: "1-3 семестра"
    - placement_test: "onSET в начале"
    - final_exam: "EPD = C1"

  course_registration: "Выбор курсов на летний семестр начинается 11 февраля 2026"

  trap: "Если зачислен в VGUH — ВНЖ студента выдаётся. Нельзя бросить VGUH и сдать Goethe вместо EPD."
  source_url: https://vorstudienlehrgang.oead.at/en/graz
  last_verified: 2026-03-01

# NAWI Graz партнёрство
nawi_graz:
  description: "Совместные программы Uni Graz + TU Graz по точным и естественным наукам"
  website: https://nawigraz.at

  bachelor:
    - Chemie / Chemistry
    - Physik / Physics
    - Mathematik
    - Erdwissenschaften (Geosciences)
    - Molekulare Biologie (Molecular Biology)

  master_english:
    - Chemistry
    - Physics
    - Advanced Materials Science
    - Computational Science

  notes: "Студент зачислен в один вуз, но проходит курсы в обоих. Диплом от одного вуза с пометкой NAWI Graz."
  source_url: https://nawigraz.at
  last_verified: 2026-03-01

