    name: "Технические и естественные науки"
    bachelor: ["AI (EN)", "Biological Chemistry (EN)", "Business Informatics", "Chemistry (EN)", "Computer Science", "Electronics", "Mechatronics", "Physics", "Technical Mathematics"]
    master: ["AI (EN)", "Biophysics", "Biological Chemistry (EN)", "Computer Science", "Electronics", "Industrial Mathematics", "Information Electronics", "Mechatronics", "Nanoscience", "Physics"]

  sowi:
    name: "Социальные и экономические науки"
    bachelor: ["Business Administration", "Business & Economics", "Business Education", "Business Informatics", "Business Law", "IBA (EN)", "Social & Behavioral Science", "Sociology"]
    master: ["Accounting & Reporting", "Business Informatics", "Controlling", "Economics (EN)", "HR Management", "IBA", "Marketing", "Quantitative Economics", "Sociology"]

  recht:
