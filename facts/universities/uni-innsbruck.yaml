# Подача документов
submission:
  method: online_only
  portal: https://lfuonline.uibk.ac.at
  enrollment: in_person_only
  notes:
    - "Зачисление только лично — по доверенности нельзя"
    - "Оригиналы должны ТОЧНО совпадать со сканами в системе"

  documents:
    - name: Паспорт
      format: JPG или PDF
      required: true
    - name: Аттестат о среднем образовании
      format: PDF
      required: true
      legalization: apostille
      translation: sworn_translator
      languages: [de, en]
    - name: Транскрипт
      format: PDF
      required: true
    - name: Сертификат немецкого A2
      format: PDF
      required: true
      notes: "B2 нужен при зачислении, не при подаче!"
    - name: Meldezettel
      required: conditional
      condition: "Если живёшь в Австрии"

  source_url: https://www.uibk.ac.at/en/admission-department/
  last_verified: 2026-03-01

