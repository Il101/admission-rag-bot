# Вступительные экзамены
entrance_exams:
  bachelor:
    with_exam:
      - name: Psychology
        description: "Тест на когнитивные и социальные компетенции + эссе"
      - name: Architecture
        description: "Творческий тест + портфолио"
      - name: Sport Science
        description: "Физические испытания + теоретический тест"
      - name: Sport Management
        description: "Собеседование + мотивационное письмо"
      - name: All Teacher Training Programmes
        description: "Отдельные процедуры по каждой специализации"

    suspended_2026:
      list:
        - Biology
        - Computer Science (Informatik)
        - Pharmacy
        - Management and Economics
      notes: "ПРИОСТАНОВЛЕНЫ в 2026/27! Поступление без экзамена."

  master:
    - name: Psychology
      description: "Тест + собеседование. Высокий конкурс."
    - name: Peace and Conflict Studies
      description: "Мотивационное письмо + собеседование"
    - name: Digital Society, Social Innovation and Global Citizenship
      description: "Мотивационное письмо + личная встреча"
    - name: Psychotherapy
      description: "Собеседование + психологический тест"

  notes: "Для программ с отбором — ОТДЕЛЬНЫЕ сроки регистрации! Не совпадают с общим Non-EU дедлайном."
  source_url: https://www.uibk.ac.at/en/college-service-center/admission-procedures/
  last_verified: 2026-03-01

# Vorstudienlehrgang Innsbruck — НЕ VWU Wien!
vorstudienlehrgang:
  name: Universitätslehrgang Deutsch (Vorstudienlehrgang Innsbruck)
  applies: true
  notes: "Своя программа при университете — НЕ венский VWU!"
  website: https://www.uibk.ac.at/weiterbildung/vorstudienlehrgang-deutsch/

  target_level: B2
  difference_from_vienna: "VWU Wien нужен для C1. Innsbruck нужен для B2 — требования ниже."

  modules:
    - name: Modul I
      target: "B1/B1+"
      start_level: A2
    - name: Modul II
      target: "B2/B2+"
      start_level: B1

  costs:
    amount: 1200
    currency: EUR
    period: semester
    total_for_2_semesters: 2400
    notes: "Уточнять на сайте вуза"

  registration_deadline_ss2026: 2026-03-02
  final_exam: "Ergänzungsprüfung = B2 эквивалент"
  source_url: https://www.uibk.ac.at/weiterbildung/vorstudienlehrgang-deutsch/
  last_verified: 2026-03-01

