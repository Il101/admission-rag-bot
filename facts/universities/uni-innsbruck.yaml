# КРИТИЧНО: Самые ранние дедлайны среди публичных университетов Австрии!
deadlines:
  # Bachelor Non-EU — ОЧЕНЬ РАННИЙ ДЕДЛАЙН!
  - semester: WS2026/27
    category: non-eu
    level: [bachelor]
    programs: without-entrance-exam
    submission:
      start: 2026-04-01
      end: 2026-05-15
    enrollment:
      start: 2026-07-13
      end: 2026-09-05
    notes: "САМЫЙ РАННИЙ дедлайн в Австрии! 15 мая (не август как в Вене). Рассмотрение 8-12 недель — подавай в начале апреля!"
    source_url: https://www.uibk.ac.at/en/admission-department/application-and-admission-deadlines/
    last_verified: 2026-03-01

  - semester: SS2027
    category: non-eu
    level: [bachelor]
    submission:
      start: 2026-09-01
      end: 2026-10-15
    enrollment:
      start: 2027-01-11
      end: 2027-02-05
    source_url: https://www.uibk.ac.at/en/admission-department/application-and-admission-deadlines/
    last_verified: 2026-03-01

  # Bachelor EU (более длинное окно)
  - semester: WS2026/27
    category: eu
    level: [bachelor]
    programs: without-entrance-exam
    submission:
      start: 2026-04-01
      end: 2026-09-05
    source_url: https://www.uibk.ac.at/en/admission-department/application-and-admission-deadlines/
    last_verified: 2026-03-01

# Enrollment periods
enrollment_periods:
  - semester: WS2026/27
    standard:
      start: 2026-07-13
      end: 2026-09-05
    exceptions:
      start: 2026-09-06
      end: 2026-10-31
      notes: "Исключения — рискованно, семестр начинается 1 октября"
  - semester: SS2027
    standard:
      start: 2027-01-11
      end: 2027-02-05

comparison_with_vienna:
  innsbruck_submission: "1 апреля — 15 мая"
  vienna_submission: "22 июня — 3 августа"
  innsbruck_enrollment: "до 5 сентября"
  vienna_enrollment: "до 31 октября"

# Требования к немецкому языку — НИЖЕ ЧЕМ В ВЕНЕ!
language_requirements:
  german:
    direct_admission: B2
    submission_minimum: A2
    notes: "Innsbruck требует B2 (не C1 как в Вене!). Это на уровень ниже."
    certificates:
      b2:
        - name: ÖSD Zertifikat B2
        - name: Goethe-Zertifikat B2
        - name: TestDaF TDN3
          notes: "TDN3 во всех разделах (не TDN4 как в Вене!)"
        - name: ÖIF-Test B2
        - name: EPD от Vorstudienlehrgang Innsbruck
    certificate_validity_years: 2
    source_url: https://www.uibk.ac.at/en/admission-department/
    last_verified: 2026-03-01

  english:
    required_for: master-english-programs
    min_level: B2
    certificates:
      - name: IELTS
        min_score: "5.5–6.0"
      - name: TOEFL iBT
        min_score: "72–87"
      - name: Cambridge B2 First (FCE)
    source_url: https://www.uibk.ac.at/en/admission-department/
    last_verified: 2026-03-01

