id: meduni-wien

name:
  de: Medizinische Universität Wien
  en: Medical University of Vienna
  ru: Медицинский университет Вены

city: Wien
website: https://meduniwien.ac.at
medat_portal: https://medizinstudieren.at
students_count: 8000
founded: "1365 (в составе Uni Wien), 2004 (самостоятельный)"
description: "Крупнейший и старейший медицинский университет немецкоязычного мира"

# Программы
programs:
  - name: Humanmedizin (Human Medicine)
    type: Diplom
    duration: "12 семестров (6 лет)"
    language: german
    degree: "Dr. med. univ."

  - name: Zahnmedizin (Dentistry)
    type: Diplom
    duration: "10 семестров (5 лет)"
    language: german
    degree: "Dr. med. dent."

  - name: Medical Informatics
    type: Master
    duration: "4 семестра"
    language: english
    degree: "Master of Science"

programs_notes:
  - "Медицина и стоматология — DIPLOMSTUDIUM, не Bachelor/Master"
  - "Степень соответствует профессиональной квалификации врача"

