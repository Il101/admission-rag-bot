# Подготовка к MedAT
preparation:
  official_materials:
    - name: VMC Stichwortlisten
      description: "Официальные тематические списки BMS"
      cost: free
      url: "medizinstudieren.at → Testinhalte"
    - name: Beispielaufgaben
      description: "Примеры задач"

  commercial_courses:
    - VMC Vienna Medical Classes  # Офлайн/онлайн, признан самым эффективным
    - MedBreaker
    - StudyMed
    - MedGurus
    - MedAT Vorbereitung
    - Comenia Akademie

  recommended_timelines:
    bms: "3–4 месяца"
    kff: "1–2 месяца ежедневной тренировки"
    tv: "1 месяц (если C1 немецкий)"
    mf: "1 месяц + тренировочный комплект (~€30)"
    sek: "1–2 недели"

  start_recommendation: "6–9 месяцев до теста (октябрь/ноябрь для июля)"

# Процедура регистрации
registration_process:
  - step: 1
    action: "Перейти на medizinstudieren.at"
    details: "Выбрать вуз (Wien/Graz/Innsbruck/Linz)"

  - step: 2
    action: "Заполнить онлайн-форму"
    fields:
      - "Studienrichtung: Humanmedizin или Zahnmedizin (изменить нельзя!)"
      - "Standort: Vienna"
      - "Kontingent: Nicht-EU-Quote для граждан не-EU"
      - "Личные данные"

  - step: 3
    action: "Оплатить €110"
    deadline: 2026-03-31
    method: "Онлайн (банковская карта, Sofortüberweisung)"

  - step: 4
    action: "Тест-день (3 июля 2026)"
    bring:
      - "Паспорт/ID + подтверждение регистрации"
      - "Синяя или чёрная ручка (HB карандаш нельзя!)"
    prohibited: "Электронные устройства"
    arrive: "За 30-60 минут до начала"

  - step: 5
    action: "Результаты (3–9 августа 2026)"
    where: "Личный кабинет на medizinstudieren.at"
    shows: "Свой балл + балл отсечения + получил ли место"

  - step: 6
    action: "Личное зачисление в MedUni Wien"
    required: true
    location: "Alser Straße 4, 1090 Wien"
    documents:
      - "Паспорт (оригинал)"
      - "Аттестат + апостиль + перевод (оригинал)"
      - "Сертификат немецкого C1 (оригинал)"
      - "Studienplatzzusage"
      - "Виза D или ВНЖ (если Non-EU)"
      - "Meldezettel"

# Временная шкала для Non-EU из России
timeline_non_eu:
  - month: "Март 2026"
