# КВОТЫ — критически важно для Non-EU!
quotas:
  humanmedizin_wien:
    total_places: 704

    austria_quote:
      percentage: 75
      places: 528
      condition: "Аттестат получен в Австрии (любое гражданство)"

    eu_quote:
      percentage: 20
      places: 141
      condition: "Граждане EU/EEA с аттестатом НЕ из Австрии"

    non_eu_quote:
      percentage: 5
      places: 35
      condition: "Граждане не-EU с аттестатом не из Австрии"

    gewidmete_studienplaetze:
      description: "Целевые места для работы на благо общества"
      max_places: 85
      within: austria_quote
      available_from: "2024/25"

  zahnmedizin_wien:
    total_places: 80
    non_eu_places: "~4"

  distribution_process:
    - "1. Лучшие 528 из AT-квоты получают места"
    - "2. Оставшиеся AT + все EU смешиваются → лучшие 141 получают места"
    - "3. Все оставшиеся (включая Non-EU) → лучшие 35 получают места"
    - "→ Non-EU с очень высоким баллом МОЖЕТ попасть в финальный пул!"

  quota_determination:
    austria: "Аттестат получен в Австрии"
    eu: "Гражданин EU, аттестат из другой EU-страны"
    non_eu: "Гражданин России/СНГ, аттестат из России"
    strategy: "Если Non-EU → переезд в Австрию на аттестат переводит в AT-квоту с 75% мест!"

  source_url: https://www.medizinstudieren.at/studienplaetze-und-kontingentregelung/studienplaetze/
  last_verified: 2026-03-01

# Требования к немецкому
language_requirements:
  german:
    for_registration: not_required
    for_medat: not_required
    for_enrollment: C1
    notes: "Можно участвовать в MedAT без немецкого, но C1 нужен ПРИ ЗАЧИСЛЕНИИ"

    certificates:
      - ÖSD Zertifikat C1 (Oberstufe Deutsch)
      - Goethe-Zertifikat C1
      - telc Deutsch C1 Hochschule
      - TestDaF TDN4  # MedUni принимает TDN4, не TDN5
      - DSH2
      - DSD II
      - Language center certificate C1/2
      - Диплом австрийской/немецкой школы (автоматически)
      - "Степень 3+ лет на немецком языке"

    certificate_validity_years: 3  # В отличие от 2 лет в большинстве вузов!

    vwu_path: "Если немецкий недостаточен → VWU → EPD. Только после EPD можно зачислиться."
    latin: "В некоторых случаях требуется Ergänzungsprüfung по латыни"

    source_url: https://www.meduniwien.ac.at/web/en/studies-further-education/application-admission/medicine-and-dentistry-degree/admission-requirements/knowledge-of-the-german-language/
    last_verified: 2026-03-01

# MedAT-H (Humanmedizin)
medat_h:
  duration: "Целый день (~08:00–17:00)"
  total_tasks: 201
  total_time_minutes: 228

  structure:
    - block: BMS
      name: "Basiskenntnistest Medizinische Studien"
      content: "Биология, химия, физика, математика"
      tasks: 94
      time_minutes: 75
      weight: 40

    - block: TV
      name: "Textverständnis"
      content: "Понимание немецких текстов"
      tasks: 12
      time_minutes: 35
      weight: 10

    - block: KFF
      name: "Kognitive Fähigkeiten & Fertigkeiten"
      content: "Когнитивные способности, импликации"
      time_minutes: 88
      weight: 40
      subtests:
        - Figuren falten
        - Zahlenfolgen
        - Wortflüssigkeit
        - Implikationen erkennen (IMP)
        - Konzentrierte Aufmerksamkeit
        - Merkfähigkeit

    - block: SEK
      name: "Sozial-emotionale Kompetenzen"
      content: "Ситуационные суждения"
      time_minutes: 30
      weight: 10

  bms_topics:
    biology: ["Клеточная биология", "Генетика", "Анатомия и физиология", "Экология и эволюция"]
    chemistry: ["Атомное строение", "Химические реакции", "Органическая химия", "pH", "Термохимия"]
    physics: ["Механика", "Электричество", "Оптика", "Термодинамика"]
    mathematics: ["Алгебра", "Геометрия", "Вероятность", "Функции"]

  source_url: https://www.medizinstudieren.at/der-aufnahmetest-medat/testinhalte/testinhalte-humanmedizin/
  last_verified: 2026-03-01

# MedAT-Z (Zahnmedizin)
medat_z:
  total_tasks: "~189"
  total_time_minutes: 273

  structure:
    - block: BMS
      tasks: 94
      time_minutes: 75
      weight: 40

    - block: MF
      name: "Manuelle Fertigkeiten"
      tasks: 8
      time_minutes: 90
      weight: 20
      subtests:
        - name: "Formen spiegeln (30 мин)"
          description: "Зеркальное вырисовывание форм"
        - name: "Draht biegen (30 мин)"
          description: "Сгибание проволоки по образцу"

    - block: KFF
      time_minutes: 78
      weight: 30
      notes: "У стоматологов НЕТ подтеста Implikationen erkennen (IMP)"

    - block: SEK
      time_minutes: 30
      weight: 10

  notes:
    - "У стоматологов НЕТ блока Textverständnis"
    - "MF — полная неожиданность для большинства, нужно тренировать!"
    - "Тренировочные комплекты продаются (~€30)"

  source_url: https://www.medizinstudieren.at/der-aufnahmetest-medat/testinhalte/testinhalte-zahnmedizin/
  last_verified: 2026-03-01

