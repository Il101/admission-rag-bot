# BOKU Wien - Universität für Bodenkultur Wien
# SSOT: Deadlines, fees, language requirements
# Last verified: 2026-03-01

id: boku-wien

name:
  de: Universität für Bodenkultur Wien
  en: University of Natural Resources and Life Sciences, Vienna
  ru: Венский университет природных ресурсов

short_name: BOKU
city: Wien
website: https://boku.ac.at
admission_portal: https://online.boku.ac.at
students_count: 12000
founded: 1872

description: "Единственный аграрный университет Австрии. Специализация: сельское хозяйство, биотехнологии, экология, ландшафтная архитектура, лесное хозяйство."

unique_programs:
  - "Agrarwissenschaften (сельское хозяйство)"
  - "Forstwirtschaft (лесное хозяйство)"
  - "Lebensmittel- und Biotechnologie"
  - "Landschaftsplanung und Landschaftsarchitektur"
  - "Umwelt- und Bioressourcenmanagement"
  - "Weinbau, Önologie und Weinwirtschaft (виноделие)"
  - "Holz- und Naturfasertechnologie"

