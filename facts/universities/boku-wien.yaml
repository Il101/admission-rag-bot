# КЛЮЧЕВОЕ: Требования к языку — B2 (не C1!)
language_requirements:
  german:
    direct_admission: B2
    submission_minimum: A2
    notes: "BOKU требует B2 (НЕ C1 как TU Wien / Uni Wien). Один из немногих венских вузов с B2."

    certificates:
      b2:
        - ÖSD Zertifikat B2
        - Goethe-Zertifikat B2
        - telc Deutsch B2
        - TestDaF TDN3
        - ÖIF B2

    vwu_available: true
    vwu_name: "VWU Wien (Vorstudienlehrgang der Wiener Universitäten)"

    certificate_validity_years: 2
    source_url: https://boku.ac.at/studienservices/studium-im-ueberblick/zulassung/deutschkenntnisse
    last_verified: 2026-03-01

  english:
    required_for: "English Master programmes"
    min_level: B2
    certificates:
      - name: TOEFL iBT
        min_score: 79
      - name: IELTS Academic
        min_score: 6.0
      - name: Cambridge CAE/CPE
        min_score: "Grade C"
    notes: "Требования ниже чем в TU Wien / WU Wien"
    source_url: https://boku.ac.at/studienservices/studium-im-ueberblick/masterstudium

# Стоимость обучения
tuition:
  - category: non-eu
    amount: 726.72
    currency: EUR
    period: semester
    additional:
      - name: ÖH-Beitrag
        amount: 25.20
    total: 751.92
    source_url: https://boku.ac.at/studienservices/studienorganisation/beitraege

  - category: eu
    amount: 0
    currency: EUR
    period: semester
    additional:
      - name: ÖH-Beitrag
        amount: 25.20
    total: 25.20

# Подача документов
submission:
  method: online_only
  portal: https://online.boku.ac.at
  enrollment: in_person
  notes: "Онлайн-подача, личное зачисление"

  documents:
    - name: Паспорт
      required: true
    - name: Аттестат о среднем образовании
      required: true
      legalization: apostille
      translation: sworn_translator
      languages: [de, en]
    - name: Транскрипт
      required: true
      translation: required
    - name: Сертификат немецкого A2/B2
      required: true
      validity: 2 years
    - name: Фото 35x45 мм
      required: true

  source_url: https://boku.ac.at/studienservices/studium-im-ueberblick/zulassung
  last_verified: 2026-03-01

# VWU Info
vwu:
  available: true
  name: "VWU Wien (Vorstudienlehrgang der Wiener Universitäten)"
  shared_with:
    - Uni Wien
    - TU Wien
    - WU Wien
    - MedUni Wien
    - Vetmeduni Wien
  cost_per_semester: 1800
  notes: "BOKU — один из 6 венских университетов в системе VWU"

