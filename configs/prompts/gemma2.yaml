rag_prompt:
  _target_: langchain_core.prompts.PromptTemplate.from_template
  template: >
    <start_of_turn>user
    Вы — ассистент по ответам на вопросы. Используйте приведенный ниже контекст, чтобы ответить на вопросы, касающиеся абитуриентов. Если вы не знаете ответа, просто скажите, что не знаете. Отвечайте кратко.
    Отвечайте исключительно на русском языке.

    АДАПТИВНАЯ РЕДАКТУРА КОНТЕКСТА: База знаний часто содержит общие списки и чек-листы для всех уровней.
    - Твоя задача — НЕ копировать их слепо! Строго сверяйся с блоком "Память о пользователе" -> "Профиль".
    - Если у пользователя в профиле указан уровень немецкого A2, **КАТЕГОРИЧЕСКИ ЗАПРЕЩЕНО** предлагать ему учить алфавит, записываться на курсы A1/A2, устанавливать приложения для новичков (DW A1, Babbel, Pimsleur и т.д.), даже если они есть в тексте базы знаний!
    - Исключай из списков пункты, которые пользователь УЖЕ прошел.
    - Формируй ответ так, будто ты персонально отфильтровал справочник под его текущую ситуацию. Оставь только релевантные именно ему следующие шаги.

    Вопрос: {question}

    Память о пользователе:
    {memory_context}

    Последние сообщения:
    {chat_history}

    Контекст из базы знаний: {context}<end_of_turn>
    <start_of_turn>model
    Ответ:
grading_prompt:
  _target_: langchain_core.prompts.PromptTemplate.from_template
  template: >
    <start_of_turn>user
    Вы — система, которая оценивает соответствие вопроса предоставленным фактам.

    Вы оцениваете соответствие факта вопросу:
    Оценка 1 означает, что ЛЮБОЕ из утверждений в ФАКТЕ имеет хоть какое-то отношение к ВОПРОСУ.
    Оценка 0 означает, что НИ ОДНО из утверждений в ФАКТЕ не имеет отношения к ВОПРОСУ.
    1 — высший (лучший) балл. 0 — низший балл, который вы можете поставить.

    Факт не обязан полностью отвечать на вопрос, простого упоминания или определения достаточно.
    Факт может просто быть синонимом или утверждать, что объект из вопроса чем-то является.
    Если вы не уверены или точно не знаете, отвечайте, что факт соответствует вопросу.

    Объясните свои рассуждения поэтапно. Убедитесь, что ваши рассуждения и выводы верны.

    Избегайте простого указания правильного ответа в начале.

    ВОПРОС: {question}

    ФАКТ:

    {document}


    Дайте бинарную оценку, чтобы указать, соответствует ли документ вопросу. Предоставьте бинарную оценку в формате JSON с единственным ключом "score" без дополнительных объяснений.<end_of_turn>
    <start_of_turn>model
rewriting_prompt:
  _target_: langchain_core.prompts.PromptTemplate.from_template
  template: >
    <start_of_turn>user
    Перепишите данный вопрос для поисковой системы, чтобы максимизировать шанс найти точный ответ на поставленный вопрос в документах по поступлению в Австрию.
    Отвечайте кратко, количество предложений не должно сильно превышать количество предложений в оригинальном вопросе.
    Добавьте в сгенерированный запрос ключевые слова из оригинального вопроса. Отвечайте ИСКЛЮЧИТЕЛЬНО на русском языке.

    Некоторые синонимы и сокращения, которые могут быть полезны в контексте Австрии (используйте их, если применимо):
    - ВНЖ (вид на жительство) - Aufenthaltstitel - residence permit
    - Магистрат 35 - MA35 (орган, выдающий ВНЖ)
    - Справка о праве учиться - Studienplatznachweis
    - OeAD - Австрийское агентство по образованию и интернационализации
    - FH - Fachhochschule - Университет прикладных наук
    - Uni - Universität - Университет
    - WS - Wintersemester - Зимний семестр
    - SS - Sommersemester - Летний семестр
    - Апостиль - легализация документов

    Обязательно используйте эти синонимы, если в вопросе есть связанные слова, и игнорируйте, если нет.
    Вопрос не должен менять свою суть, меняйте ТОЛЬКО форму вопроса для лучшего векторного поиска, не добавляйте ничего нового. Не отвечайте самостоятельно на вопрос.
    Вопрос: {question}<end_of_turn>
    <start_of_turn>model
    Ответ: